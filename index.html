<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterbus - Panel de Auditorías de Stock</title>
    <!-- Cargamos Chart.js para gráficos hermosos y tipografía moderna -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* PALETA DE COLORES MASTERBUS Y ESTILO GENERAL */
        :root {
            --bg-principal: #F4F6F9;
            --negro-masterbus: #1A1A1A;
            --rojo-masterbus: #E30613;
            --blanco: #FFFFFF;
            --verde-ok: #2E7D32;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-principal);
            color: var(--negro-masterbus);
        }

        /* HEADER INSTITUCIONAL */
        header {
            background-color: var(--negro-masterbus);
            color: var(--blanco);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            border-bottom: 4px solid var(--rojo-masterbus);
        }

        .logo-placeholder {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -1px;
            margin-right: 20px;
        }
        .logo-placeholder span {
            color: var(--rojo-masterbus);
        }

        h1 {
            font-size: 18px;
            margin: 0;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* CONTENEDOR PRINCIPAL */
        .dashboard-container {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* FILA DE TARJETAS (KPIs) */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--blanco);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
        }

        .card.totales::before { background-color: var(--negro-masterbus); }
        .card.correctas::before { background-color: var(--verde-ok); }
        .card.erroneas::before { background-color: var(--rojo-masterbus); }

        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #777;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 32px;
            font-weight: 700;
        }

        .card-percentage {
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
        }
        .correctas .card-percentage { color: var(--verde-ok); }
        .erroneas .card-percentage { color: var(--rojo-masterbus); }

        /* SECCIÓN DE GRÁFICOS */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-box {
            background-color: var(--blanco);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .chart-box h3 {
            margin-top: 0;
            font-size: 14px;
            text-transform: uppercase;
            border-bottom: 1px solid #ECEFF1;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <!-- Simulación visual de la M de Masterbus con los dos 1 enfrentados -->
        <div class="logo-placeholder">1<span>1</span> M</div>
        <h1>Control de Stock & Auditorías Operativas</h1>
    </header>

    <div class="dashboard-container">
        <!-- KPIs -->
        <div class="kpi-row">
            <div class="card totales">
                <div class="card-title">Auditorías Totales</div>
                <div class="card-value" id="txt-totales">1.430</div>
            </div>
            <div class="card correctas">
                <div class="card-title">Correctas (OK)</div>
                <div class="card-value" id="txt-ok">1.214</div>
                <div class="card-percentage">84.9% del total</div>
            </div>
            <div class="card erroneas">
                <div class="card-title">Discrepancias</div>
                <div class="card-value" id="txt-error">216</div>
                <div class="card-percentage">15.1% del desvío</div>
            </div>
        </div>

        <!-- GRÁFICOS -->
        <div class="charts-grid">
            <div class="chart-box">
                <h3>Exactitud por Bases Operativas</h3>
                <canvas id="chartBases"></canvas>
            </div>
            <div class="chart-box">
                <h3>Tipos de Discrepancia</h3>
                <canvas id="chartDonut"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Configuración del Gráfico de Bases (Barras Negras de Masterbus)
        const ctxBases = document.getElementById('chartBases').getContext('2d');
        new Chart(ctxBases, {
            type: 'bar',
            data: {
                labels: ['Zárate', 'Misiones', 'Frías', 'Olavarría', 'Comodoro', 'P. Moreno'],
                datasets: [{
                    label: 'Auditorías',
                    data: [1074, 55, 54, 38, 35, 31],
                    backgroundColor: '#1A1A1A', // Negro corporativo
                    borderRadius: 6
                }]
            },
            options: {
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { x: { grid: { display: false } }, y: { grid: { display: false } } }
            }
        });

        // Configuración del Gráfico de Rosca (Rojo y Gris)
        const ctxDonut = document.getElementById('chartDonut').getContext('2d');
        new Chart(ctxDonut, {
            type: 'doughnut',
            data: {
                labels: ['Negativas (Faltante)', 'Positivas (Sobrante)'],
                datasets: [{
                    data: [61.2, 38.8],
                    backgroundColor: ['#E30613', '#4A4A4A'], // Rojo Masterbus y Gris Oscuro
                    borderWidth: 0
                }]
            },
            options: {
                plugins: { legend: { position: 'bottom' } },
                cutout: '70%'
            }
        });
    </script>
</body>
</html>
