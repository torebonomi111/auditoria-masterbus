    <style>
        :root {
            --bg-principal: #F4F6F9;
            --negro-masterbus: #1A1A1A;
            --rojo-masterbus: #E30613;
            --blanco: #FFFFFF;
            --verde-ok: #2E7D32;
        }

        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--bg-principal); color: var(--negro-masterbus); }
        header { background-color: var(--negro-masterbus); color: var(--blanco); padding: 15px 30px; display: flex; align-items: center; border-bottom: 4px solid var(--rojo-masterbus); }
        .logo-placeholder { font-weight: 700; font-size: 24px; margin-right: 20px; }
        .logo-placeholder span { color: var(--rojo-masterbus); }
        h1 { font-size: 18px; margin: 0; font-weight: 400; text-transform: uppercase; }

        .dashboard-container { padding: 30px; max-width: 1600px; margin: 0 auto; transition: opacity 0.3s ease; }
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .card { background-color: var(--blanco); border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
